repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.4.0
    hooks:
      - id: check-added-large-files
        args: ["--maxkb=10240"]
        exclude: \.wasm$
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-toml
      - id: check-yaml

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.5
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/hukkin/mdformat
    rev: 0.7.22
    hooks:
      - id: mdformat
        additional_dependencies: [mdformat-gfm]

  - repo: local
    hooks:
      - id: site-biome
        name: site biome check
        entry: npm run site:check
        language: system
        pass_filenames: false
        files: ^site/(src/.*|index\.html|package(-lock)?\.json|tsconfig(\.node)?\.json|components\.json|vite\.config\.ts|biome\.json)$
